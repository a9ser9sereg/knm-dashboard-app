name: Release

# Публикуем НЕ в GitHub Releases (тот же урок, что и с GitHub Pages для самого
# дашборда — часть пользователей в РФ не открывает github.io/githubusercontent
# без VPN). GitHub Actions используем только как бесплатный компьютер для
# сборки; установщики и манифест автообновления заливаем в Yandex Object
# Storage (бакет knm-dashboard-app, публичный на чтение).

on:
  push:
    tags:
      - 'v*'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.YC_RELEASER_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_RELEASER_SECRET }}
  AWS_DEFAULT_REGION: ru-central1
  S3_ENDPOINT: https://storage.yandexcloud.net
  BUCKET: knm-dashboard-app

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            fragment: windows
            rust-targets: ''
            build-args: ''
          - platform: macos-latest
            fragment: macos
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            build-args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Зависимости
        run: npm ci

      - name: Сборка (подписанные артефакты автообновления)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.build-args }}

      - name: Публикация установщика в Yandex Object Storage (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="v${VERSION}"
          AWS="aws --endpoint-url $S3_ENDPOINT"

          EXE=$(find src-tauri/target -path '*/bundle/nsis/*.exe' ! -name '*.exe.sig' | head -1)
          SIG="$EXE.sig"

          $AWS s3 cp "$EXE" "s3://$BUCKET/$PREFIX/$(basename "$EXE")" --content-type application/octet-stream
          $AWS s3 cp "$SIG" "s3://$BUCKET/$PREFIX/$(basename "$SIG")" --content-type text/plain

          EXE_URL="https://storage.yandexcloud.net/$BUCKET/$PREFIX/$(basename "$EXE")"
          python3 .github/scripts/make_fragment.py \
            --out fragment.json --url "$EXE_URL" --sig-file "$SIG" \
            --key windows-x86_64

          $AWS s3 cp fragment.json "s3://$BUCKET/_fragments/windows.json" --content-type application/json

      - name: Публикация установщика в Yandex Object Storage (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PREFIX="v${VERSION}"
          AWS="aws --endpoint-url $S3_ENDPOINT"

          DMG=$(find src-tauri/target -path '*/bundle/dmg/*.dmg' | head -1)
          APPTAR=$(find src-tauri/target -path '*/bundle/macos/*.app.tar.gz' ! -name '*.sig' | head -1)
          SIG="$APPTAR.sig"

          $AWS s3 cp "$DMG" "s3://$BUCKET/$PREFIX/$(basename "$DMG")" --content-type application/octet-stream
          $AWS s3 cp "$APPTAR" "s3://$BUCKET/$PREFIX/$(basename "$APPTAR")" --content-type application/gzip
          $AWS s3 cp "$SIG" "s3://$BUCKET/$PREFIX/$(basename "$SIG")" --content-type text/plain

          APPTAR_URL="https://storage.yandexcloud.net/$BUCKET/$PREFIX/$(basename "$APPTAR")"
          python3 .github/scripts/make_fragment.py \
            --out fragment.json --url "$APPTAR_URL" --sig-file "$SIG" \
            --key darwin-x86_64 --key darwin-aarch64

          $AWS s3 cp fragment.json "s3://$BUCKET/_fragments/macos.json" --content-type application/json

  publish-manifest:
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_RELEASER_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_RELEASER_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Собрать latest.json из фрагментов и опубликовать
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          AWS="aws --endpoint-url $S3_ENDPOINT"

          $AWS s3 cp "s3://$BUCKET/_fragments/windows.json" windows.json
          $AWS s3 cp "s3://$BUCKET/_fragments/macos.json" macos.json

          python3 .github/scripts/make_manifest.py \
            --version "$VERSION" --out latest.json windows.json macos.json

          $AWS s3 cp latest.json "s3://$BUCKET/latest.json" \
            --content-type application/json --cache-control no-cache
          $AWS s3 rm "s3://$BUCKET/_fragments/windows.json"
          $AWS s3 rm "s3://$BUCKET/_fragments/macos.json"
